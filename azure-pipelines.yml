trigger:
- main  # GitHub-la main branch-la push panna build trigger aagum

# IDHU DHAAN MUKKIAM: Microsoft-hosted badhila unga local agent pool
pool:
  name: 'Default'  # Neenga Azure DevOps-la create panna Pool name (usually Default)

variables:
  # Azure DevOps -> Project Settings -> Service Connections-la neenga kudutha peru
  dockerRegistryServiceConnection: 'MyACRConnection' 
  kubernetesServiceConnection: 'MyAKSConnection'
  
  imageRepository: 'bank-api'
  containerRegistry: 'citibankacr.azurecr.io' # Unga ACR URL
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
- stage: BuildAndPush
  displayName: 'Build and Push Stage'
  jobs:
  - job: Build
    displayName: 'Build on Local Agent'
    steps:
    
    # Step 1: Login to ACR (Self-hosted agent-ku auth thevai)
    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: 'login'
        containerRegistry: $(dockerRegistryServiceConnection)

    # Step 2: Build and Push (Idhu auto-ah Dockerfile-la irukura Maven-ah run pannum)
    - task: Docker@2
      displayName: 'Build and Push image'
      inputs:
        command: 'buildAndPush'
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: DeployToAKS
  displayName: 'Deploy Stage'
  dependsOn: BuildAndPush
  jobs:
  - job: Deploy
    displayName: 'Deploy to AKS'
    steps:
    
    # Step 3: Deployment.yaml file-ah AKS-la apply pannudhu
    - task: KubernetesManifest@0
      displayName: 'Deploy to AKS'
      inputs:
        action: 'deploy'
        namespace: 'bank-api-namespace'
        manifests: '$(Build.SourcesDirectory)/deployment.yaml'
        containers: '$(containerRegistry)/$(imageRepository):$(tag)'
        kubernetesServiceConnection: $(kubernetesServiceConnection)

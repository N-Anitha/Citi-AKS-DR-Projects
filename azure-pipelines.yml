trigger:
- main

pool:
  name: 'Default'

variables:
  dockerRegistryServiceConnection: 'MyACRConnection'
  imageRepository: 'bank-api'
  containerRegistry: 'citibankreg31318.azurecr.io'
  tag: '$(Build.BuildId)'

stages:
# STAGE 1: Build Once (Consistency-kaaga)
- stage: BuildAndPush
  jobs:
  - job: Build
    steps:
    - task: Docker@2
      inputs:
        command: 'buildAndPush'
        repository: $(imageRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

# STAGE 2: Deploy to East US (Primary)
- stage: DeployToEastUS
  dependsOn: BuildAndPush
  jobs:
  - job: Deploy
    steps:
    - task: KubernetesManifest@0
      inputs:
        action: 'deploy'
        kubernetesServiceConnection: 'Citi-EastUS-AKS-Conn' # Target: East US
        namespace: 'bank-api-namespace'
        manifests: '$(Build.SourcesDirectory)/deployment.yaml'
        containers: '$(containerRegistry)/$(imageRepository):$(tag)'

# STAGE 3: Deploy to Central India (Disaster Recovery)
- stage: DeployToCentralIndia
  dependsOn: DeployToEastUS # East US success aana dhaan DR-ku pogum
  jobs:
  - job: Deploy
    steps:
    - task: KubernetesManifest@0
      inputs:
        action: 'deploy'
        kubernetesServiceConnection: 'Citi-CentralIndia-AKS-Conn' # Target: Central India
        namespace: 'bank-api-namespace'
        manifests: '$(Build.SourcesDirectory)/deployment.yaml'
        containers: '$(containerRegistry)/$(imageRepository):$(tag)'
